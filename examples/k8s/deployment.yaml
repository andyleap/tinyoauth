apiVersion: v1
kind: Namespace
metadata:
  name: tinyoauth
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tinyoauth
  namespace: tinyoauth
---
# Cluster-wide read access to Traefik Middlewares and ConfigMaps. The bouncer
# only ever reads these — never writes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tinyoauth-reader
rules:
- apiGroups: ["traefik.io"]
  resources: ["middlewares"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tinyoauth-reader
subjects:
- kind: ServiceAccount
  name: tinyoauth
  namespace: tinyoauth
roleRef:
  kind: ClusterRole
  name: tinyoauth-reader
  apiGroup: rbac.authorization.k8s.io
---
# Permission to mint SA tokens for the bouncer's own SA only. resourceNames
# pins this to self — the bouncer cannot mint tokens for any other identity.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tinyoauth-self-token
  namespace: tinyoauth
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  resourceNames: ["tinyoauth"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tinyoauth-self-token
  namespace: tinyoauth
subjects:
- kind: ServiceAccount
  name: tinyoauth
  namespace: tinyoauth
roleRef:
  kind: Role
  name: tinyoauth-self-token
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyoauth-config
  namespace: tinyoauth
data:
  config.yaml: |
    listen: ":4180"
    auth_host: "auth.andyleap.dev"
    issuer: "https://id.andyleap.dev"
    cookie_name: "_tinyoauth"
    cookie_domain: ".andyleap.dev"
    cookie_secret: "REPLACE_WITH_64_HEX_CHARS"
    session_ttl: "12h"
    annotation_prefix: "tinyoauth.andyleap.dev"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinyoauth
  namespace: tinyoauth
spec:
  replicas: 2
  selector:
    matchLabels: { app: tinyoauth }
  template:
    metadata:
      labels: { app: tinyoauth }
    spec:
      serviceAccountName: tinyoauth
      containers:
      - name: tinyoauth
        image: ghcr.io/andyleap/tinyoauth:latest
        args: ["--config=/etc/tinyoauth/config.yaml"]
        env:
        - name: POD_NAMESPACE
          valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
        - name: POD_SERVICE_ACCOUNT
          valueFrom: { fieldRef: { fieldPath: spec.serviceAccountName } }
        ports:
        - containerPort: 4180
        readinessProbe:
          httpGet: { path: /healthz, port: 4180 }
        volumeMounts:
        - name: config
          mountPath: /etc/tinyoauth
      volumes:
      - name: config
        configMap: { name: tinyoauth-config }
---
apiVersion: v1
kind: Service
metadata:
  name: tinyoauth
  namespace: tinyoauth
spec:
  selector: { app: tinyoauth }
  ports:
  - port: 80
    targetPort: 4180
