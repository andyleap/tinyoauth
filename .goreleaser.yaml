version: 2

project_name: tinyoauth

before:
  hooks:
    - go mod tidy

builds:
  - id: tinyoauth
    main: ./cmd/tinyoauth
    binary: tinyoauth
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

dockers:
  - id: amd64
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/andyleap/tinyoauth:{{ .Version }}-amd64"
      - "ghcr.io/andyleap/tinyoauth:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.source=https://github.com/andyleap/tinyoauth"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
  - id: arm64
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/andyleap/tinyoauth:{{ .Version }}-arm64"
      - "ghcr.io/andyleap/tinyoauth:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.source=https://github.com/andyleap/tinyoauth"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/andyleap/tinyoauth:{{ .Version }}"
    image_templates:
      - "ghcr.io/andyleap/tinyoauth:{{ .Version }}-amd64"
      - "ghcr.io/andyleap/tinyoauth:{{ .Version }}-arm64"
  - name_template: "ghcr.io/andyleap/tinyoauth:{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/andyleap/tinyoauth:{{ .Version }}-amd64"
      - "ghcr.io/andyleap/tinyoauth:{{ .Version }}-arm64"
  - name_template: "ghcr.io/andyleap/tinyoauth:latest"
    image_templates:
      - "ghcr.io/andyleap/tinyoauth:latest-amd64"
      - "ghcr.io/andyleap/tinyoauth:latest-arm64"

release:
  github:
    owner: andyleap
    name: tinyoauth
  prerelease: auto
